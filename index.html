<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="widht=device-width, initial-scale=1.0" />
    <title>Asteroids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #000;
        }
    </style>
</head>

<body>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        // SETUP
        const canvas = document.getElementById('gameCanvas');
        const ctx    = canvas.getContext('2d');

        // Make canvas fill the window
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // SHIP
        const ship = {
            x: canvas.width / 2,    // start at center
            y: canvas.height / 2,
            angle: -Math.PI / 2,    // pointing straight up
            vx: 0,                  // velocity x
            vy: 0,                  // velocity y
            thrust: 300,            // acceleration force
            friction: 0.99,         // velocity dampening per frame (1 means no friction)
            rotSpeed: 3,            // radians per second
            size: 15                // ship size in pixels
        };

        // BULLETS
        const bullets = [];
        const bulletSpeed = 500;    // pixels per second
        const bulletLifetime = 1;   // seconds before bullet disappears
        const shootCooldown = 0.25; // seconds between shots
        let shootTimer =0;          // counts down t 0, then you can shoot again

        const asteroids = [];

        const asteroidSizes = {
            large:  { radius: 50, speed: 60, score: 20 },
            medium: { radius: 25, speed: 100, score: 50 },
            small:  { radius: 12, speed: 150, score: 100 }
        };

        // INPUT
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) =>{
            keys[e.key] = false;
        });

        // Resize canvas if window size changes
        window.addEventListener('resize', () => {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        });


        // GAME LOOP
        let lastTime = 0;

        function gameLoop(timestamp) {
            // Delta time: how many seconds passed since last frame
            // This keeps speed consistent regardless of frame rate
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        // UPDATE
        function update(dt) {
            // Rotate left / right
            if (keys['ArrowLeft'])  ship.angle -= ship.rotSpeed * dt;
            if (keys['ArrowRight']) ship.angle += ship.rotSpeed * dt;

            // Thrust forward
            if (keys['ArrowUp']) {
                ship.vx += Math.cos(ship.angle) * ship.thrust * dt;
                ship.vy += Math.sin(ship.angle) * ship.thrust * dt;
            }

            // Apply friction (slows the ship down gradually)
            ship.vx *= ship.friction;
            ship.vy *= ship.friction;

            // Move the ship
            ship.x += ship.vx * dt;
            ship.y += ship.vy * dt;

            // Screen wrapping
            if (ship.x < 0)             ship.x = canvas.width;
            if (ship.x > canvas.width)  ship.x = 0;
            if (ship.y < 0)             ship.y = canvas.height;
            if (ship.y > canvas.height) ship.y = 0;

            // Shooting cooldown tick
            shootTimer -= dt;

            // Shoot on spacebar
            if (keys[' '] && shootTimer <= 0) {
                shoot();
                shootTimer = shootCooldown;
            }

            // Update bullets
            for (let i = bullets.length - 1; i >=0; i--) {
                const b = bullets[i];

                b.x += b.vx * dt;
                b.y += b.vy * dt;
                b.lifetime -= dt;

                // Screen wrap for bullets
                if (b.x < 0)             b.x = canvas.width;
                if (b.x > canvas.width)  b.x = 0;
                if (b.y < 0)             b.y = canvas.height;
                if (b.y > canvas.height) b.y = 0;

                // Remove dead bullets
                if (b.lifetime <= 0) {
                    bullets.splice(i, 1);
                }
            }

            // Bullets vs Asteroid collision
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                let bulletHit = false;

                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const a = asteroids[j];

                    if (circleCollides(b.x, b.y, 3, a.x, a.y, a.radius)) {
                        // Remove the asteroid
                        asteroids.splice(j, 1);

                        // Split into smaller ones
                        if (a.sizeKey === 'large') {
                            spawnAsteroid(a.x, a.y, 'medium');
                            spawnAsteroid(a.x, a.y, 'medium');
                        } if (a.sizeKey === 'medium') {
                            spawnAsteroid(a.x, a.y, 'small');
                            spawnAsteroid(a.x, a.y, 'small');
                        }
                        // small asteroids disappear

                        bulletHit = true;
                        break; // one bullet can only hit one asteroid
                    }
                }

                if (bulletHit) {
                    bullets.splice(i, 1); // remove the bullet that hit
                }
            }

            // Ship vs Asteroid collision
            for (const a of asteroids) {
                if (circleCollides(ship.x, ship.y, ship.size * 0.8, a.x, a.y, a.radius)) {
                    resetShip();
                    break; // no need to check more asteroids this frame
                }
            }

            for (const a of asteroids) {
                a.x += a.vx * dt;
                a.y += a.vy * dt;
                a.angle += a.rotSpeed * dt;

                // Screen wrap
                if (a.x < -a.radius)               a.x = canvas.width  + a.radius;
                if (a.x >  canvas.width + a.radius) a.x = -a.radius;
                if (a.y < -a.radius)               a.y = canvas.height + a.radius;
                if (a.y >  canvas.height + a.radius) a.y = -a.radius;
            }
        }

        // DRAW
        function draw() {
            // Clear screen
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw ship
            drawShip();

            // Draw bullets
            drawBullets();

            // Draw asteroids
            drawAsteroids();
        }

        function drawShip() {
            ctx.save(); // save current canvas state

            // Move canvas origin to ship position, then rotate
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            // Draw the triangle
            ctx.beginPath();
            ctx.moveTo(ship.size, 0);                         // nose (front)
            ctx.lineTo(-ship.size, -ship.size * 0.6);         // back left
            ctx.lineTo(-ship.size * 0.5, 0);                  // inner back dip
            ctx.lineTo(-ship.size, ship.size * 0.6);          // back right
            ctx.closePath();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.restore(); // restore canvas state so other draws aren't affected
        }

        function drawBullets() {
            ctx.fillStyle = '#fff';

            for (const b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); // small circle with radius 3
                ctx.fill();
            }
        }

        function drawAsteroids() {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;

            for (const a of asteroids) {
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.angle);

                ctx.beginPath();
                ctx.moveTo(a.verts[0].x, a.verts[0].y);
                for (let i = 1; i < a.verts.length; i++) {
                    ctx.lineTo(a.verts[i].x, a.verts[i].y);
                }
                ctx.closePath();
                ctx.stroke();

                ctx.restore();
            }
        }

        function shoot() {
            bullets.push({
                x: ship.x + Math.cos(ship.angle) * ship.size,   // spawn at ship's nose
                y: ship.y + Math.sin(ship.angle) * ship.size,
                vx: Math.cos(ship.angle) * bulletSpeed,
                vy: Math.sin(ship.angle) * bulletSpeed,
                lifetime: bulletLifetime
            });
        }

        function randomEdgePosition() {
            // Pick a random point along the edge of the screen
            const side = Math.floor(Math.random() * 4); // for all sides
            
            if (side === 0) return { x: Math.random() * canvas.width, y: 0 };
            if (side === 1) return { x: canvas.width, y: Math.random() * canvas.height };
            if (side === 2) return { x: Math.random() * canvas.width, y: canvas.height };
                            return { x: 0, y: Math.random() * canvas.height };
        }

        function spawnAsteroid(x, y, sizeKey) {
            const size = asteroidSizes[sizeKey];
            const angle = Math.random() * Math.PI * 2; // random direction

            // Generate jagged vertices for the asteroid shape
            const numVerts = 10;
            const verts = [];
            for (let i = 0; i < numVerts; i++) {
                const a = (i / numVerts) * Math.PI * 2;
                const r = size.radius * (0.75 + Math.random() * 0.25); // vary radius 75% - 100 %
                verts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
            }

            asteroids.push({
                x,
                y,
                vx: Math.cos(angle) * size.speed,
                vy: Math.sin(angle) * size.speed,
                radius: size.radius,
                sizeKey,
                verts,
                angle: 0,
                rotSpeed: (Math.random() - 0.5) * 2
            });
        }

        function spawnInitialAsteroids(count) {
            for (let i = 0; i < count; i++) {
                const pos = randomEdgePosition();
                spawnAsteroid(pos.x, pos.y, 'large');
            }
        }

        function circleCollides(ax, ay, ar, bx, by, br) {
            const dx = ax - bx;
            const dy = ay - by;
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < ar + br;
        }

        function resetShip() {
            ship.x = canvas.width / 2;
            ship.y = canvas.height / 2;
            ship.vx = 0;
            ship.vy = 0;
            ship.angle = -Math.PI / 2;
        }

        spawnInitialAsteroids(5);

        // START
        requestAnimationFrame(gameLoop);

    </script>

</body>

</html>
