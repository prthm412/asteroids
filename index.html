<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="widht=device-width, initial-scale=1.0" />
    <title>Asteroids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #000;
        }
    </style>
</head>

<body>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        // SETUP
        const canvas = document.getElementById('gameCanvas');
        const ctx    = canvas.getContext('2d');

        // Make canvas fill the window
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // SHIP
        const ship = {
            x: canvas.width / 2,    // start at center
            y: canvas.height / 2,
            angle: -Math.PI / 2,    // pointing straight up
            vx: 0,                  // velocity x
            vy: 0,                  // velocity y
            thrust: 300,            // acceleration force
            friction: 0.99,         // velocity dampening per frame (1 means no friction)
            rotSpeed: 3,            // radians per second
            size: 15                // ship size in pixels
        };

        // BULLETS
        const bullets = [];
        const bulletSpeed = 500;    // pixels per second
        const bulletLifetime = 1;   // seconds before bullet disappears
        const shootCooldown = 0.25; // seconds between shots
        let shootTimer =0;          // counts down t 0, then you can shoot again

        // ASTEROIDS
        const asteroids = [];

        const asteroidSizes = {
            large:  { radius: 50, speed: 60, score: 20 },
            medium: { radius: 25, speed: 100, score: 50 },
            small:  { radius: 12, speed: 150, score: 100 }
        };

        // GAME STATE
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameState = 'start';    // 'start', 'playing', 'dead', 'gameover'
        let deadTimer = 0;          // pause briefly after dying before respawning
        const deadDelay = 2;        // seconds to wait after dying

        // PARTICLES
        const particles = [];

        function spawnExplosion(x, y, count, speed, color) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const spd   = speed * (0.3 + Math.random() * 0.7);
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd,
                    lifetime: 0.4 + Math.random() * 0.4,    // how long it lives
                    maxLifetime: 0.4 + Math.random() * 0.4,
                    color
                });
            }
        }

        // STARFIELD
        const stars = [];
        for (let i = 0; i < 80; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 1.5,         // radius
                a: 0.3 + Math.random() * 0.7    // opacity
            });
        }

        // --- SOUND ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, type, duration, volume = 0.3) {
            const osc     = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(frequency * 0.01, audioCtx.currentTime + duration);

            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
        }

        function soundShoot()    { playSound(440, 'sine',     0.15, 0.2); }
        function soundExplodeLg(){ playSound(80,  'sawtooth', 0.6,  0.4); }
        function soundExplodeMd(){ playSound(120, 'sawtooth', 0.4,  0.3); }
        function soundExplodeSm(){ playSound(200, 'square',   0.2,  0.2); }
        function soundDie()      { playSound(60,  'sawtooth', 0.8,  0.5); }

        // INPUT
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) =>{
            keys[e.key] = false;
        });

        // Resize canvas if window size changes
        window.addEventListener('resize', () => {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        });


        // GAME LOOP
        let lastTime = 0;

        function gameLoop(timestamp) {
            // Delta time: how many seconds passed since last frame
            // This keeps speed consistent regardless of frame rate
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        // UPDATE
        function update(dt) {
            // Only update game logic when playing
            if (gameState === 'playing') {

                // Rotate
                if (keys['ArrowLeft'])  ship.angle -= ship.rotSpeed * dt;
                if (keys['ArrowRight']) ship.angle += ship.rotSpeed * dt;

                // Thrust
                if (keys['ArrowUp']) {
                ship.vx += Math.cos(ship.angle) * ship.thrust * dt;
                ship.vy += Math.sin(ship.angle) * ship.thrust * dt;
                }

                // Friction + movement
                ship.vx *= ship.friction;
                ship.vy *= ship.friction;
                ship.x += ship.vx * dt;
                ship.y += ship.vy * dt;

                // Screen wrap
                if (ship.x < 0)             ship.x = canvas.width;
                if (ship.x > canvas.width)  ship.x = 0;
                if (ship.y < 0)             ship.y = canvas.height;
                if (ship.y > canvas.height) ship.y = 0;

                // Shooting cooldown
                shootTimer -= dt;

                if (keys[' '] && shootTimer <= 0) {
                shoot();
                shootTimer = shootCooldown;
                }

                // Update bullets
                for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                b.lifetime -= dt;

                if (b.x < 0)             b.x = canvas.width;
                if (b.x > canvas.width)  b.x = 0;
                if (b.y < 0)             b.y = canvas.height;
                if (b.y > canvas.height) b.y = 0;

                if (b.lifetime <= 0) bullets.splice(i, 1);
                }

                // Update asteroids
                for (const a of asteroids) {
                a.x += a.vx * dt;
                a.y += a.vy * dt;
                a.angle += a.rotSpeed * dt;

                if (a.x < -a.radius)                a.x = canvas.width  + a.radius;
                if (a.x >  canvas.width + a.radius)  a.x = -a.radius;
                if (a.y < -a.radius)                a.y = canvas.height + a.radius;
                if (a.y >  canvas.height + a.radius) a.y = -a.radius;
                }

                // Bullet vs Asteroid collision
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    let bulletHit = false;

                        for (let j = asteroids.length - 1; j >= 0; j--) {
                            const a = asteroids[j];

                            if (circleCollides(b.x, b.y, 3, a.x, a.y, a.radius)) {
                            asteroids.splice(j, 1);
                            score += asteroidSizes[a.sizeKey].score;

                            if (a.sizeKey === 'large') {
                                spawnAsteroid(a.x, a.y, 'medium');
                                spawnAsteroid(a.x, a.y, 'medium');
                                spawnExplosion(a.x, a.y, 18, 120, '#aaa');
                                soundExplodeLg();
                            } else if (a.sizeKey === 'medium') {
                                spawnAsteroid(a.x, a.y, 'small');
                                spawnAsteroid(a.x, a.y, 'small');
                                spawnExplosion(a.x, a.y, 12, 90, '#aaa');
                                soundExplodeMd();
                            }
                            else {
                                spawnExplosion(a.x, a.y, 8, 70, '#fff');
                                soundExplodeSm();
                            }

                            if (asteroids.length === 0) {
                                level++;
                                spawnInitialAsteroids(4 + level);
                            }

                            bulletHit = true;
                            break;
                            }
                        }
                    if (bulletHit) bullets.splice(i, 1);
                }

                // Ship vs Asteroid collision
                for (const a of asteroids) {
                    if (circleCollides(ship.x, ship.y, ship.size * 0.8, a.x, a.y, a.radius)) {
                        lives--;
                        spawnExplosion(ship.x, ship.y, 25, 150, '#ff6644');
                        soundDie();
                        if (lives <= 0) {
                        gameState = 'gameover';
                        } else {
                        gameState = 'dead';
                        deadTimer = deadDelay;
                        resetShip();
                        }
                        break;
                    }
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.lifetime -= dt;
                    p.vx *= 0.98;   // slight drag
                    p.vy *= 0.98;
                    if (p.lifetime <= 0) particles.splice(i, 1);
                }

            } else if (gameState === 'dead') {
                // Wait for deadTimer then respawn
                deadTimer -= dt;
                if (deadTimer <= 0) {
                gameState = 'playing';
                }

            } else if (gameState === 'start' || gameState === 'gameover') {
                // Press Enter to start or restart
                if (keys['Enter']) {
                startGame();
                }
            }
        }

        // DRAW
        function draw() {
            // Clear screen
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawStars();
            drawAsteroids();
            drawBullets();
            drawParticles();

            if (gameState === 'playing' || gameState === 'dead') {
                if (gameState !== 'dead') drawShip(); // hide ship briefly while dead
                drawHUD();
            }

            if (gameState === 'start') drawStartScreen();
            if (gameState === 'gameover') drawGameOverScreen();
            if (gameState === 'dead') drawDeadScreen();
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            // Thrust flame
            if (keys['ArrowUp']) {
                ctx.beginPath();
                ctx.moveTo(-ship.size * 0.5, 0);                              // inner dip
                ctx.lineTo(-ship.size * 1.2, -(ship.size * 0.2));             // flame left
                ctx.lineTo(-ship.size * (1.5 + Math.random() * 0.5), 0);      // flame tip (flickers)
                ctx.lineTo(-ship.size * 1.2,  (ship.size * 0.2));             // flame right
                ctx.closePath();
                ctx.fillStyle = Math.random() > 0.5 ? '#ff9900' : '#ff4400'; // flicker color
                ctx.fill();
            }

            // Ship body
            ctx.beginPath();
            ctx.moveTo(ship.size, 0);
            ctx.lineTo(-ship.size, -ship.size * 0.6);
            ctx.lineTo(-ship.size * 0.5, 0);
            ctx.lineTo(-ship.size,  ship.size * 0.6);
            ctx.closePath();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.restore();
        }

        function drawBullets() {
            ctx.fillStyle = '#fff';

            for (const b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); // small circle with radius 3
                ctx.fill();
            }
        }

        function drawAsteroids() {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;

            for (const a of asteroids) {
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.angle);

                ctx.beginPath();
                ctx.moveTo(a.verts[0].x, a.verts[0].y);
                for (let i = 1; i < a.verts.length; i++) {
                    ctx.lineTo(a.verts[i].x, a.verts[i].y);
                }
                ctx.closePath();
                ctx.stroke();

                ctx.restore();
            }
        }

        function drawParticles() {
            for (const p of particles) {
                const alpha = p.lifetime / p.maxLifetime; // fade out as lifetime drops
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawStars() {
            for (const s of stars) {
                ctx.save();
                ctx.globalAlpha = s.a;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function shoot() {
            soundShoot();
            bullets.push({
                x: ship.x + Math.cos(ship.angle) * ship.size,   // spawn at ship's nose
                y: ship.y + Math.sin(ship.angle) * ship.size,
                vx: Math.cos(ship.angle) * bulletSpeed,
                vy: Math.sin(ship.angle) * bulletSpeed,
                lifetime: bulletLifetime
            });
        }

        function randomEdgePosition() {
            // Pick a random point along the edge of the screen
            const side = Math.floor(Math.random() * 4); // for all sides
            
            if (side === 0) return { x: Math.random() * canvas.width, y: 0 };
            if (side === 1) return { x: canvas.width, y: Math.random() * canvas.height };
            if (side === 2) return { x: Math.random() * canvas.width, y: canvas.height };
                            return { x: 0, y: Math.random() * canvas.height };
        }

        function spawnAsteroid(x, y, sizeKey) {
            const size = asteroidSizes[sizeKey];
            const angle = Math.random() * Math.PI * 2; // random direction

            // Generate jagged vertices for the asteroid shape
            const numVerts = 10;
            const verts = [];
            for (let i = 0; i < numVerts; i++) {
                const a = (i / numVerts) * Math.PI * 2;
                const r = size.radius * (0.75 + Math.random() * 0.25); // vary radius 75% - 100 %
                verts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
            }

            asteroids.push({
                x,
                y,
                vx: Math.cos(angle) * size.speed,
                vy: Math.sin(angle) * size.speed,
                radius: size.radius,
                sizeKey,
                verts,
                angle: 0,
                rotSpeed: (Math.random() - 0.5) * 2
            });
        }

        function spawnInitialAsteroids(count) {
            for (let i = 0; i < count; i++) {
                const pos = randomEdgePosition();
                spawnAsteroid(pos.x, pos.y, 'large');
            }
        }

        function circleCollides(ax, ay, ar, bx, by, br) {
            const dx = ax - bx;
            const dy = ay - by;
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < ar + br;
        }

        function resetShip() {
            ship.x = canvas.width / 2;
            ship.y = canvas.height / 2;
            ship.vx = 0;
            ship.vy = 0;
            ship.angle = -Math.PI / 2;
        }

        function startGame() {
            score = 0;
            lives = 3;
            level = 1;
            gameState = 'playing';
            asteroids.length = 0;
            bullets.length = 0;
            resetShip();
            spawnInitialAsteroids(4 + level);
        }

        function drawHUD() {
            // Score
            ctx.fillStyle = '#fff';
            ctx.font = '20px monospace';
            ctx.textAlign = 'left';
            ctx.fillText('SCORE: ' + score, 20, 35);

            // Level
            ctx.textAlign = 'right';
            ctx.fillText('LEVEL: ' + level, canvas.width - 20, 35);

            // Lives as small ship icons
            for (let i = 0; i < lives; i++) {
                drawLifeIcon(30 + i * 25, 60);
            }
        }


        function drawLifeIcon(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-Math.PI / 2);
            ctx.beginPath();
            ctx.moveTo(10, 0);
            ctx.lineTo(-10, -6);
            ctx.lineTo(-7, 0);
            ctx.lineTo(-10, 6);
            ctx.closePath();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();
        }

        function drawStartScreen() {
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.font = 'bold 64px monospace';
            ctx.fillText('ASTEROIDS', canvas.width / 2, canvas.height / 2 - 60);
            ctx.font = '22px monospace';
            ctx.fillText('ARROW KEYS to move   SPACE to shoot', canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText('Press ENTER to start', canvas.width / 2, canvas.height / 2 + 50);
        }

        function drawGameOverScreen() {
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.font = 'bold 64px monospace';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);
            ctx.font = '22px monospace';
            ctx.fillText('SCORE: ' + score, canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText('Press ENTER to play again', canvas.width / 2, canvas.height / 2 + 50);
        }

        function drawDeadScreen() {
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.font = '22px monospace';
            ctx.fillText('LIVES LEFT: ' + lives, canvas.width / 2, canvas.height / 2);
        }

        // START
        requestAnimationFrame(gameLoop);

    </script>

</body>

</html>
